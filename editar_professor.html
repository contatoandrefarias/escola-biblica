{% extends "base.html" %}
{% block conteudo %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0">✏️ Editar Professor</h4>
    <a href="/professores" class="btn btn-outline-secondary">
        ← Voltar
    </a>
</div>

<div class="card shadow-sm" style="max-width:500px">
    <div class="card-header">Dados do Professor</div>
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Nome <span class="text-danger">*</span>
                </label>
                <input type="text" name="nome"
                       class="form-control" required
                       value="{{ professor['nome'] }}">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Telefone
                </label>
                <input type="text" name="telefone"
                       class="form-control"
                       value="{{ professor['telefone'] or '' }}">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">E-mail</label>
                <input type="email" name="email"
                       class="form-control"
                       value="{{ professor['email'] or '' }}">
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">
                    Especialidade
                </label>
                <input type="text" name="especialidade"
                       class="form-control"
                       value="{{ professor['especialidade'] or '' }}"
                       placeholder="Ex: Antigo Testamento...">
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-warning px-4">
                    💾 Salvar
                </button>
                <a href="/professores"
                   class="btn btn-outline-secondary">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
