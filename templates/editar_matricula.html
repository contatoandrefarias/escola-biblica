{% extends "base.html" %}
{% block conteudo %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0">✏️ Editar Matrícula e Notas</h4>
    <a href="/matriculas" class="btn btn-outline-secondary">← Voltar</a>
</div>

<div class="card shadow-sm" style="max-width:500px">
    <div class="card-header fw-semibold">
        Matrícula de {{ matricula['aluno_nome'] }} em {{ matricula['disciplina_nome'] }}
    </div>
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold">Aluno</label>
                <input type="text" class="form-control"
                       value="{{ matricula['aluno_nome'] }}" readonly>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Disciplina</label>
                <input type="text" class="form-control"
                       value="{{ matricula['disciplina_nome'] }}" readonly>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-6">
                    <label class="form-label fw-semibold">Nota 1</label>
                    <input type="number" name="nota1"
                           class="form-control" step="0.5" min="0" max="10"
                           value="{{ matricula['nota1'] if matricula['nota1'] is not none else '' }}">
                </div>
                <div class="col-6">
                    <label class="form-label fw-semibold">Nota 2</label>
                    <input type="number" name="nota2"
                           class="form-control" step="0.5" min="0" max="10"
                           value="{{ matricula['nota2'] if matricula['nota2'] is not none else '' }}">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Média Final</label>
                <input type="number" name="nota_final"
                       class="form-control" step="0.5" min="0" max="10"
                       value="{{ matricula['nota_final'] if matricula['nota_final'] is not none else '' }}"
                       placeholder="Calculado automaticamente se N1 e N2 preenchidas">
                <div class="form-text">
                    A média será calculada automaticamente se N1 e N2 forem preenchidas.
                    Você pode sobrescrever se necessário.
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Status</label>
                <select name="status" class="form-select">
                    <option value="cursando"
                        {% if matricula['status'] == 'cursando' %}selected{% endif %}>
                        📖 Cursando
                    </option>
                    <option value="aprovado"
                        {% if matricula['status'] == 'aprovado' %}selected{% endif %}>
                        ✅ Aprovado
                    </option>
                    <option value="reprovado"
                        {% if matricula['status'] == 'reprovado' %}selected{% endif %}>
                        ❌ Reprovado
                    </option>
                </select>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-6">
                    <label class="form-label fw-semibold">Data de Início</label>
                    <input type="date" name="data_inicio"
                           class="form-control"
                           value="{{ matricula['data_inicio'] or '' }}">
                </div>
                <div class="col-6">
                    <label class="form-label fw-semibold">Data de Conclusão</label>
                    <input type="date" name="data_conclusao"
                           class="form-control"
                           value="{{ matricula['data_conclusao'] or '' }}">
                </div>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-warning px-4">
                    💾 Salvar Alterações
                </button>
                <a href="/matriculas" class="btn btn-outline-secondary">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
