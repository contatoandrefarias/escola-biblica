{% extends "base.html" %}
{% block conteudo %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0">⚙️ Minha Conta</h4>
</div>

<!-- Informações do usuário -->
<div class="card mb-4" style="max-width:500px">
    <div class="card-header">Suas Informações</div>
    <div class="card-body">
        <p class="mb-2">
            <strong>Nome:</strong> {{ current_user.nome }}
        </p>
        <p class="mb-2">
            <strong>E-mail:</strong> {{ current_user.email }}
        </p>
        <p class="mb-0">
            <strong>Perfil:</strong>
            {% if current_user.is_admin %}
                <span class="badge bg-danger">👑 Administrador</span>
            {% else %}
                <span class="badge bg-secondary">👤 Usuário</span>
            {% endif %}
        </p>
    </div>
</div>

<!-- Trocar senha -->
<div class="card" style="max-width:500px">
    <div class="card-header">🔐 Alterar Senha</div>
    <div class="card-body">
        <form method="POST">

            <div class="mb-3">
                <label class="form-label fw-semibold">Senha Atual</label>
                <input type="password" name="senha_atual"
                       class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Nova Senha</label>
                <input type="password" name="nova_senha"
                       class="form-control" required minlength="6"
                       placeholder="Mínimo 6 caracteres">
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">
                    Confirmar Nova Senha
                </label>
                <input type="password" name="confirmar"
                       class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary px-4">
                <i class="bi bi-lock me-1"></i>
                Alterar Senha
            </button>

        </form>
    </div>
</div>

{% endblock %}
