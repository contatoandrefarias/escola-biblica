{% extends "base.html" %}
{% block conteudo %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0">➕ Novo Aluno</h4>
</div>

<div class="card shadow-sm">
    <div class="card-body">
        <form action="{{ url_for('novo_aluno') }}" method="POST">
            <div class="mb-3">
                <label for="nome" class="form-label">Nome Completo <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="nome" name="nome" required>
            </div>
            <div class="mb-3">
                <label for="data_nascimento" class="form-label">Data de Nascimento</label>
                <input type="date" class="form-control" id="data_nascimento" name="data_nascimento">
            </div>
            <div class="mb-3">
                <label for="telefone" class="form-label">Telefone</label>
                <input type="text" class="form-control" id="telefone" name="telefone" placeholder="(XX) XXXXX-XXXX">
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">E-mail</label>
                <input type="email" class="form-control" id="email" name="email">
            </div>

            <div class="mb-3">
                <label for="nome_pai" class="form-label">Nome do Pai</label>
                <input type="text" class="form-control" id="nome_pai" name="nome_pai">
            </div>
            <div class="mb-3">
                <label for="nome_mae" class="form-label">Nome da Mãe</label>
                <input type="text" class="form-control" id="nome_mae" name="nome_mae">
            </div>
            <div class="mb-3">
                <label for="endereco" class="form-label">Endereço Completo</label>
                <input type="text" class="form-control" id="endereco" name="endereco">
            </div>

            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="membro_igreja" name="membro_igreja">
                <label class="form-check-label" for="membro_igreja">Membro da Igreja?</label>
            </div>

            <div class="mb-3">
                <label for="turma_id" class="form-label">Turma</label>
                <select class="form-select" id="turma_id" name="turma_id">
                    <option value="">-- Nenhuma Turma --</option>
                    {% if turmas %}
                        {% for turma in turmas %}
                            <option value="{{ turma['id'] }}">
                                {{ turma['nome'] }} ({{ turma['faixa_etaria']|replace('_', ' ')|title }})
                            </option>
                        {% endfor %}
                    {% else %}
                        <option value="" disabled>Nenhuma turma ativa encontrada</option>
                    {% endif %}
                </select>
            </div>

            <div class="d-flex justify-content-end gap-2 mt-4">
                <a href="{{ url_for('alunos') }}" class="btn btn-secondary">Cancelar</a>
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save-fill me-2"></i> Cadastrar Aluno
                </button>
            </div>
        </form>
    </div>
</div>

{% endblock %}
