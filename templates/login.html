<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Escola Bíblica Nova Aliança</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a237e 0%, #283593 50%, #1565c0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            font-size: 3rem;
            text-align: center;
            margin-bottom: 8px;
        }
        .titulo {
            text-align: center;
            color: #1a237e;
            font-weight: 700;
            font-size: 1.3rem;
            margin-bottom: 4px;
        }
        .subtitulo {
            text-align: center;
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 28px;
        }
        .btn-login {
            background: linear-gradient(135deg, #1a237e, #283593);
            border: none;
            color: white;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        .btn-login:hover { opacity: 0.9; color: white; }
        .form-control:focus {
            border-color: #1a237e;
            box-shadow: 0 0 0 3px rgba(26,35,126,0.15);
        }
        .alert { border-radius: 10px; border: none; }
    </style>
</head>
<body>

<div class="login-box">

    <!-- Logo e título -->
    <div class="logo">✝️</div>
    <div class="titulo">Escola Bíblica</div>
    <div class="subtitulo">Igreja Nova Aliança — Sistema de Gestão</div>

    <!-- Mensagens de erro/sucesso -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for cat, msg in messages %}
            <div class="alert alert-{{ 'success' if cat=='sucesso' else 'danger' }}">
                {{ msg }}
            </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <!-- Formulário de login -->
    <form method="POST">

        <div class="mb-3">
            <label class="form-label fw-semibold text-dark">
                <i class="bi bi-envelope me-1"></i>E-mail
            </label>
            <input
                type="email"
                name="email"
                class="form-control form-control-lg"
                placeholder="seu@email.com"
                required
                autofocus
            >
        </div>

        <div class="mb-4">
            <label class="form-label fw-semibold text-dark">
                <i class="bi bi-lock me-1"></i>Senha
            </label>
            <div class="input-group">
                <input
                    type="password"
                    name="senha"
                    id="senha"
                    class="form-control form-control-lg"
                    placeholder="••••••••"
                    required
                >
                <!-- Botão mostrar/esconder senha -->
                <button
                    class="btn btn-outline-secondary"
                    type="button"
                    onclick="
                        var s = document.getElementById('senha');
                        s.type = s.type === 'password' ? 'text' : 'password';
                    "
                >
                    <i class="bi bi-eye"></i>
                </button>
            </div>
        </div>

        <button type="submit" class="btn btn-login">
            <i class="bi bi-box-arrow-in-right me-2"></i>
            Entrar no Sistema
        </button>

    </form>

    <hr class="my-4">

    <div class="text-center text-muted small">
        <i class="bi bi-shield-lock me-1"></i>
        Acesso restrito a usuários autorizados
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
