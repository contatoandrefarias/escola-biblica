{% extends "base.html" %}
{% block conteudo %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0">➕ Novo Usuário</h4>
    <a href="/usuarios" class="btn btn-outline-secondary">← Voltar</a>
</div>

<div class="card" style="max-width:500px">
    <div class="card-header">Dados de Acesso</div>
    <div class="card-body">
        <form method="POST">

            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Nome Completo <span class="text-danger">*</span>
                </label>
                <input type="text" name="nome"
                       class="form-control" required autofocus
                       placeholder="Nome do usuário">
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">
                    E-mail <span class="text-danger">*</span>
                </label>
                <input type="email" name="email"
                       class="form-control" required
                       placeholder="email@exemplo.com">
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Senha <span class="text-danger">*</span>
                </label>
                <input type="password" name="senha"
                       class="form-control" required
                       placeholder="Mínimo 6 caracteres"
                       minlength="6">
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Perfil</label>
                <select name="perfil" class="form-select">
                    <option value="usuario">👤 Usuário Comum</option>
                    <option value="admin">👑 Administrador</option>
                </select>
                <small class="text-muted">
                    Admin pode gerenciar usuários do sistema.
                </small>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-danger px-4">
                    <i class="bi bi-check-circle me-1"></i>
                    Criar Usuário
                </button>
                <a href="/usuarios" class="btn btn-outline-secondary">
                    Cancelar
                </a>
            </div>

        </form>
    </div>
</div>

{% endblock %}
