{% extends "base.html" %}
{% block conteudo %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0">➕ Nova Turma</h4>
    <a href="/turmas" class="btn btn-outline-secondary">← Voltar às Turmas</a>
</div>

<div class="card shadow-sm" style="max-width: 500px;">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label for="nome" class="form-label fw-semibold">Nome da Turma</label>
                <input type="text" name="nome" id="nome" class="form-control" required
                       value="{{ request.form.get('nome', '') }}">
            </div>
            <div class="mb-3">
                <label for="descricao" class="form-label fw-semibold">Descrição (Opcional)</label>
                <textarea name="descricao" id="descricao" class="form-control" rows="3">{{ request.form.get('descricao', '') }}</textarea>
            </div>

            <div class="mb-3">
                <label for="faixa_etaria" class="form-label fw-semibold">Faixa Etária</label>
                <select name="faixa_etaria" id="faixa_etaria" class="form-select" required>
                    <option value="" data-description="Selecione a faixa etária para definir a lógica de avaliação.">
                        — Selecione a Faixa Etária —
                    </option>
                    <option value="criancas_0_3"
                            data-description="Não há notas. Status baseado apenas na frequência. (0-3 anos)"
                            {% if request.form.get('faixa_etaria') == 'criancas_0_3' %}selected{% endif %}>
                        Crianças (0-3 anos)
                    </option>
                    <option value="criancas_4_7"
                            data-description="Não há notas. Status baseado apenas na frequência. (4-7 anos)"
                            {% if request.form.get('faixa_etaria') == 'criancas_4_7' %}selected{% endif %}>
                        Crianças (4-7 anos)
                    </option>
                    <option value="criancas_8_12"
                            data-description="Não há notas. Status baseado apenas na frequência. (8-12 anos)"
                            {% if request.form.get('faixa_etaria') == 'criancas_8_12' %}selected{% endif %}>
                        Crianças (8-12 anos)
                    </option>
                    <option value="adolescentes_13_15"
                            data-description="Uma nota (N1) composta por Participação (1), Desafio (1) e Prova (8). Status baseado em N1 e frequência. (13-15 anos)"
                            {% if request.form.get('faixa_etaria') == 'adolescentes_13_15' %}selected{% endif %}>
                        Adolescentes (13-15 anos)
                    </option>
                    <option value="jovens_16_17"
                            data-description="Uma nota (N1) composta por Participação (1), Desafio (1) e Prova (8). Status baseado em N1 e frequência. (16-17 anos)"
                            {% if request.form.get('faixa_etaria') == 'jovens_16_17' %}selected{% endif %}>
                        Jovens (16-17 anos)
                    </option>
                    <option value="adultos"
                            data-description="Duas notas (N1 e N2). Média final de N1 e N2. Status baseado na média e frequência."
                            {% if request.form.get('faixa_etaria') == 'adultos' %}selected{% endif %}>
                        Adultos
                    </option>
                </select>
                <div id="faixa_etaria_description" class="form-text mt-2">
                    Selecione a faixa etária para definir a lógica de avaliação.
                </div>
            </div>

            <div class="mb-3 form-check form-switch">
                <input class="form-check-input" type="checkbox" id="ativa" name="ativa" checked>
                <label class="form-check-label" for="ativa">Turma Ativa</label>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success px-4">
                    <i class="bi bi-plus-circle-fill me-2"></i> Criar Turma
                </button>
                <a href="/turmas" class="btn btn-outline-secondary">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const selectElement = document.getElementById('faixa_etaria');
        const descriptionDiv = document.getElementById('faixa_etaria_description');

        function updateDescription() {
            const selectedOption = selectElement.options[selectElement.selectedIndex];
            descriptionDiv.textContent = selectedOption.dataset.description || '';
        }

        // Atualiza a descrição na carga inicial da página
        updateDescription();

        // Atualiza a descrição quando a seleção muda
        selectElement.addEventListener('change', updateDescription);
    });
</script>

{% endblock %}
