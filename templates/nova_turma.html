{% extends "base.html" %}
{% block conteudo %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0">➕ Nova Turma</h4>
    <a href="/turmas" class="btn btn-outline-secondary">← Voltar</a>
</div>

<div class="card" style="max-width:500px">
    <div class="card-header">Dados da Turma</div>
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Nome da Turma <span class="text-danger">*</span>
                </label>
                <input type="text" name="nome" class="form-control"
                       required autofocus
                       placeholder="Ex: Adolescentes, Adultos...">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Faixa Etária</label>
                <select name="faixa_etaria" class="form-select">
                    <option value="">— Selecione —</option>
                    <option value="0 a 5 anos">🧒 0 a 5 anos — Maternal</option>
                    <option value="6 a 9 anos">👦 6 a 9 anos — Juniores</option>
                    <option value="10 a 12 anos">🧑 10 a 12 anos — Pre-adolescentes</option>
                    <option value="13 a 17 anos">👨 13 a 17 anos — Adolescentes</option>
                    <option value="18 a 25 anos">🧑‍🎓 18 a 25 anos — Jovens</option>
                    <option value="26 a 40 anos">👨‍💼 26 a 40 anos — Adultos</option>
                    <option value="Acima de 40 anos">👴 Acima de 40 — Maturidade</option>
                    <option value="Todas as idades">👨‍👩‍👧‍👦 Todas as idades</option>
                </select>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Descrição</label>
                <textarea name="descricao" class="form-control" rows="3"
                    placeholder="Informacoes adicionais sobre a turma...">
                </textarea>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary px-4">
                    💾 Criar Turma
                </button>
                <a href="/turmas" class="btn btn-outline-secondary">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
