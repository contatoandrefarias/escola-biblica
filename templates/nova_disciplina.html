{% extends "base.html" %}
{% block conteudo %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0">➕ Nova Disciplina</h4>
    <a href="/disciplinas" class="btn btn-outline-secondary">← Voltar</a>
</div>

<div class="card" style="max-width:540px">
    <div class="card-header">Dados da Disciplina</div>
    <div class="card-body">
        <form method="POST">

            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Nome <span class="text-danger">*</span>
                </label>
                <input type="text" name="nome"
                       class="form-control" required autofocus
                       placeholder="Ex: Antigo Testamento">
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Descricao</label>
                <textarea name="descricao" class="form-control" rows="2"
                    placeholder="Breve descricao da disciplina">
                </textarea>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">
                    📅 Duracao da Disciplina
                </label>
                <div class="input-group">
                    <input type="number" name="duracao_semanas"
                           class="form-control" value="4"
                           min="1" max="52" required>
                    <span class="input-group-text fw-semibold">
                        semanas
                    </span>
                </div>
                <div class="form-text">
                    💡 Exemplo: 4 semanas, 8 semanas, 12 semanas...
                </div>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-6">
                    <label class="form-label fw-semibold">
                        Nota Minima
                    </label>
                    <div class="input-group">
                        <input type="number" name="nota_minima"
                               class="form-control" value="6.0"
                               step="0.5" min="0" max="10">
                        <span class="input-group-text">pts</span>
                    </div>
                </div>
                <div class="col-6">
                    <label class="form-label fw-semibold">
                        Freq. Minima
                    </label>
                    <div class="input-group">
                        <input type="number" name="frequencia_minima"
                               class="form-control" value="75"
                               min="0" max="100">
                        <span class="input-group-text">%</span>
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Professor</label>
                <select name="professor_id" class="form-select">
                    <option value="">— Sem professor —</option>
                    {% for p in professores %}
                    <option value="{{ p['id'] }}">{{ p['nome'] }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-4">
                <div class="card border-warning">
                    <div class="card-body py-3">
                        <div class="form-check form-switch">
                            <input type="checkbox"
                                   name="tem_atividades"
                                   class="form-check-input"
                                   id="tem_atividades"
                                   style="width:2.8rem;height:1.4rem;cursor:pointer">
                            <label class="form-check-label fw-semibold ms-2"
                                   for="tem_atividades">
                                📝 Esta disciplina tem atividades por aula
                            </label>
                        </div>
                        <div class="form-text ms-5 mt-1">
                            Se ativado, na chamada aparecera uma coluna
                            para marcar quem realizou a atividade da aula.
                        </div>
                    </div>
                </div>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-warning px-4">
                    💾 Salvar Disciplina
                </button>
                <a href="/disciplinas" class="btn btn-outline-secondary">
                    Cancelar
                </a>
            </div>

        </form>
    </div>
</div>

{% endblock %}
