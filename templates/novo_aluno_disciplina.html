{% extends "base.html" %}
{% block conteudo %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0">➕ Matricular Aluno em Disciplina</h4>
    <a href="/matriculas" class="btn btn-outline-secondary">← Voltar às Matrículas</a>
</div>

<div class="card shadow-sm" style="max-width: 600px;">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label for="aluno_id" class="form-label fw-semibold">Aluno</label>
                <select name="aluno_id" id="aluno_id" class="form-select" required>
                    <option value="">— Selecione o Aluno —</option>
                    {% for aluno in alunos %}
                    <option value="{{ aluno['id'] }}"
                            {% if request.form.get('aluno_id')|int == aluno['id'] %}selected{% endif %}>
                        {{ aluno['nome'] }} (Turma: {{ aluno['turma_nome'] if aluno['turma_nome'] else 'N/A' }})
                    </option>
                    {% endfor %}
                </select>
                <div class="form-text">
                    Selecione o aluno para matricular em uma disciplina.
                </div>
            </div>

            <div class="mb-3">
                <label for="disciplina_id" class="form-label fw-semibold">Disciplina</label>
                <select name="disciplina_id" id="disciplina_id" class="form-select" required>
                    <option value="">— Selecione a Disciplina —</option>
                    {% for disciplina in disciplinas %}
                    <option value="{{ disciplina['id'] }}"
                            {% if request.form.get('disciplina_id')|int == disciplina['id'] %}selected{% endif %}>
                        {{ disciplina['nome'] }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label for="data_inicio" class="form-label fw-semibold">Data de Início</label>
                <input type="date" name="data_inicio" id="data_inicio" class="form-control"
                       value="{{ request.form.get('data_inicio', now.strftime('%Y-%m-%d')) }}" required>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success px-4">
                    <i class="bi bi-plus-circle-fill me-2"></i> Matricular Aluno
                </button>
                <a href="/matriculas" class="btn btn-outline-secondary">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
