{% extends "base.html" %}
{% block conteudo %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0">➕ Nova Matrícula</h4>
    <a href="/matriculas" class="btn btn-outline-secondary">
        ← Voltar
    </a>
</div>

<div class="card" style="max-width:500px">
    <div class="card-header">Dados da Matrícula</div>
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Aluno <span class="text-danger">*</span>
                </label>
                <select name="aluno_id" class="form-select" required>
                    <option value="">— Selecione o aluno —</option>
                    {% for a in alunos %}
                    <option value="{{ a['id'] }}">
                        {{ a['nome'] }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">
                    Disciplina <span class="text-danger">*</span>
                </label>
                <select name="disciplina_id"
                        class="form-select" required>
                    <option value="">
                        — Selecione a disciplina —
                    </option>
                    {% for d in disciplinas %}
                    <option value="{{ d['id'] }}">
                        {{ d['nome'] }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-danger px-4">
                    💾 Matricular
                </button>
                <a href="/matriculas"
                   class="btn btn-outline-secondary">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
