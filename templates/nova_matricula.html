{% extends "base.html" %}
{% block conteudo %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0">➕ Matricular Turma em Disciplina</h4>
    <a href="/matriculas" class="btn btn-outline-secondary">← Voltar às Matrículas</a>
</div>

<div class="card shadow-sm" style="max-width: 600px;">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label for="turma_id" class="form-label fw-semibold">Turma</label>
                <select name="aluno_id" id="turma_id" class="form-select" required> {# Note: name="aluno_id" é usado para enviar o ID da turma #}
                    <option value="">— Selecione a Turma —</option>
                    {% for turma in turmas %}
                    <option value="{{ turma['id'] }}"
                            {% if request.form.get('aluno_id')|int == turma['id'] %}selected{% endif %}>
                        {{ turma['nome'] }} ({{ turma['faixa_etaria']|replace('_', ' ')|title }})
                    </option>
                    {% endfor %}
                </select>
                <div class="form-text">
                    Selecione a turma para matricular todos os seus alunos na disciplina.
                </div>
            </div>

            <div class="mb-3">
                <label for="disciplina_id" class="form-label fw-semibold">Disciplina</label>
                <select name="disciplina_id" id="disciplina_id" class="form-select" required>
                    <option value="">— Selecione a Disciplina —</option>
                    {% for disciplina in disciplinas %}
                    <option value="{{ disciplina['id'] }}"
                            {% if request.form.get('disciplina_id')|int == disciplina['id'] %}selected{% endif %}>
                        {{ disciplina['nome'] }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label for="data_inicio" class="form-label fw-semibold">Data de Início</label>
                <input type="date" name="data_inicio" id="data_inicio" class="form-control"
                       value="{{ request.form.get('data_inicio', now.strftime('%Y-%m-%d')) }}" required>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success px-4">
                    <i class="bi bi-plus-circle-fill me-2"></i> Matricular Turma
                </button>
                <a href="/matriculas" class="btn btn-outline-secondary">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
