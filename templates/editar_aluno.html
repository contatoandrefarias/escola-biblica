{% extends "base.html" %}
{% block conteudo %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0">✏️ Editar Aluno</h4>
    <a href="/alunos" class="btn btn-outline-secondary">← Voltar</a>
</div>

<div class="card" style="max-width:500px">
    <div class="card-header">Dados do Aluno</div>
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Nome Completo <span class="text-danger">*</span>
                </label>
                <input type="text" name="nome"
                       class="form-control" required
                       value="{{ aluno['nome'] }}">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Telefone</label>
                <input type="text" name="telefone"
                       class="form-control"
                       value="{{ aluno['telefone'] or '' }}">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">E-mail</label>
                <input type="email" name="email"
                       class="form-control"
                       value="{{ aluno['email'] or '' }}">
            </div>
            <div class="mb-4">
                <div class="form-check">
                    <input type="checkbox" name="membro_igreja"
                           class="form-check-input" id="membro"
                           {% if aluno['membro_igreja'] %}
                               checked
                           {% endif %}>
                    <label class="form-check-label" for="membro">
                        ✝️ Membro da Igreja
                    </label>
                </div>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-warning px-4">
                    💾 Atualizar
                </button>
                <a href="/alunos"
                   class="btn btn-outline-secondary">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
