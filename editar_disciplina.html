{% extends "base.html" %}
{% block conteudo %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0">✏️ Editar Disciplina</h4>
    <a href="/disciplinas" class="btn btn-outline-secondary">
        ← Voltar
    </a>
</div>

<div class="card shadow-sm" style="max-width:540px">
    <div class="card-header">Dados da Disciplina</div>
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Nome <span class="text-danger">*</span>
                </label>
                <input type="text" name="nome"
                       class="form-control" required
                       value="{{ disciplina['nome'] }}">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Descricao
                </label>
                <textarea name="descricao"
                          class="form-control" rows="2">{{ disciplina['descricao'] or '' }}</textarea>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    📅 Duracao
                </label>
                <div class="input-group">
                    <input type="number" name="duracao_semanas"
                           class="form-control" min="1" max="52"
                           value="{{ disciplina['duracao_semanas'] }}">
                    <span class="input-group-text">semanas</span>
                </div>
            </div>
            <div class="row g-3 mb-3">
                <div class="col-6">
                    <label class="form-label fw-semibold">
                        Nota Minima
                    </label>
                    <div class="input-group">
                        <input type="number" name="nota_minima"
                               class="form-control" step="0.5"
                               value="{{ disciplina['nota_minima'] }}">
                        <span class="input-group-text">pts</span>
                    </div>
                </div>
                <div class="col-6">
                    <label class="form-label fw-semibold">
                        Freq. Minima
                    </label>
                    <div class="input-group">
                        <input type="number" name="frequencia_minima"
                               class="form-control"
                               value="{{ disciplina['frequencia_minima'] }}">
                        <span class="input-group-text">%</span>
                    </div>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Professor
                </label>
                <select name="professor_id" class="form-select">
                    <option value="">— Sem professor —</option>
                    {% for p in professores %}
                    <option value="{{ p['id'] }}"
                        {% if disciplina['professor_id'] == p['id'] %}
                            selected{% endif %}>
                        {{ p['nome'] }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <div class="card border-warning">
                    <div class="card-body py-3">
                        <div class="form-check form-switch">
                            <input type="checkbox"
                                   name="tem_atividades"
                                   class="form-check-input"
                                   id="tem_ativ"
                                   style="width:2.8rem;height:1.4rem"
                                   {% if disciplina['tem_atividades'] %}
                                   checked{% endif %}>
                            <label class="form-check-label
                                         fw-semibold ms-2"
                                   for="tem_ativ">
                                📝 Tem atividades por aula
                            </label>
                        </div>
                    </div>
                </div>
            </div>
            <div class="mb-4">
                <div class="form-check form-switch">
                    <input type="checkbox" name="ativa"
                           class="form-check-input" id="ativa"
                           style="width:2.8rem;height:1.4rem"
                           {% if disciplina['ativa'] %}checked{% endif %}>
                    <label class="form-check-label fw-semibold ms-2"
                           for="ativa">
                        ✅ Disciplina Ativa
                    </label>
                </div>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-warning px-4">
                    💾 Salvar
                </button>
                <a href="/disciplinas"
                   class="btn btn-outline-secondary">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
